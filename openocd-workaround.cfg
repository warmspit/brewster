# OpenOCD configuration for ESP32-S3 with USB JTAG
# Workaround for OpenOCD 0.12.0 descriptor issue

# Set up USB JTAG adapter
adapter driver esp_usb_jtag
espusbjtag vid_pid 0x303a 0x1001

# Override the problematic descriptor query
set ::env(IGNORE_JTAG_CAPS) 1

adapter speed 5000
transport select jtag

# ESP32-S3 JTAG configuration
set _CHIPNAME esp32s3
jtag newtap $_CHIPNAME cpu -irlen 6 -expected-id 0x120034e5

set _TARGETNAME $_CHIPNAME.cpu
target create $_TARGETNAME esp32 -chain-position $_TARGETNAME

# Start listening for GDB connections
gdb_port 3333
telnet_port 4444

init

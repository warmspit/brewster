# Alternative ESP32-S3 OpenOCD config - manual JTAG setup
# This avoids the esp_usb_jtag driver descriptor issue

# Use libusb directly instead of esp_usb_jtag
adapter driver ftdi
ftdi_device_desc "ESP32-S3"
ftdi_vid_pid 0x0403 0x6010
ftdi_layout_init 0x0508 0x0f1b
ftdi_layout_signal nTRST -oe 0x0100
ftdi_layout_signal nSRST -oe 0x0200

adapter speed 5000
transport select jtag

# ESP32-S3 JTAG TAP
set _CHIPNAME esp32s3
jtag newtap $_CHIPNAME cpu -irlen 6 -expected-id 0x120034e5

set _TARGETNAME $_CHIPNAME.cpu
set _CPU_TAPNAME $_CHIPNAME.cpu
set _CPUTAP $_CPUTAPNAME

target create $_TARGETNAME esp32 -chain-position $_TARGETNAME

init

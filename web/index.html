<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Brewster</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #060c14;
      --surface:   #0d1826;
      --border:    rgba(159, 180, 203, 0.18);
      --text:      rgba(230, 241, 255, 0.88);
      --muted:     rgba(159, 180, 203, 0.6);
      --accent:    #40d990;
      --accent2:   #40c4ff;
      --danger:    #ff6e6e;
      --warn:      #f7d774;
      --font:      'Avenir Next', 'Trebuchet MS', system-ui, sans-serif;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: var(--font);
      font-size: 14px;
    }

    /* ── Header ─────────────────────────────────────────────────────────── */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 20px 12px;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
      gap: 16px;
    }

    .header-left {
      display: flex;
      align-items: baseline;
      gap: 18px;
      flex-wrap: wrap;
    }

    h1 {
      font-size: 15px;
      font-weight: 700;
      letter-spacing: 0.12em;
      color: var(--accent2);
    }


    .header-right {
      display: flex;
      align-items: center;
      gap: 12px;
      flex-shrink: 0;
    }

    /* ── Status pills ────────────────────────────────────────────────────── */
    .status-pill {
      display: inline-block;
      padding: 2px 10px;
      border-radius: 999px;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.04em;
    }
    .status-pill.status-ok     { background: rgba(64, 217, 144, 0.15); color: var(--accent);  border: 1px solid rgba(64, 217, 144, 0.35); }
    .status-pill.status-warn   { background: rgba(247, 215, 116, 0.12); color: var(--warn);   border: 1px solid rgba(247, 215, 116, 0.35); }
    .status-pill.status-danger { background: rgba(255, 110, 110, 0.12); color: var(--danger); border: 1px solid rgba(255, 110, 110, 0.35); }

    .collect-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #ff6e6e;
      display: inline-block;
      flex-shrink: 0;
      transition: background 0.3s, box-shadow 0.3s;
    }
    .collect-dot.active {
      background: #40d990;
      box-shadow: 0 0 6px rgba(64, 217, 144, 0.55);
    }

    /* ── Menu ───────────────────────────────────────────────────────────── */
    .menu-container { position: relative; }

    #menu-btn {
      background: none;
      border: 1px solid var(--border);
      color: var(--muted);
      border-radius: 6px;
      width: 30px;
      height: 30px;
      font-size: 18px;
      line-height: 1;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    #menu-btn:hover { color: var(--text); border-color: var(--accent2); }

    #menu-dropdown {
      display: none;
      position: absolute;
      right: 0;
      top: calc(100% + 6px);
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      overflow: hidden;
      z-index: 100;
      min-width: 160px;
    }
    #menu-dropdown.open { display: block; }

    #menu-dropdown button {
      display: block;
      width: 100%;
      padding: 10px 16px;
      background: none;
      border: none;
      color: var(--text);
      text-align: left;
      cursor: pointer;
      font-family: var(--font);
      font-size: 13px;
    }
    #menu-dropdown button:hover { background: rgba(64, 196, 255, 0.08); }
    #menu-dropdown button:disabled { color: var(--muted); cursor: default; }
    #menu-dropdown button + button { border-top: 1px solid var(--border); }

    /* ── Stats bar ──────────────────────────────────────────────────────── */
    .stats-bar {
      display: flex;
      align-items: center;
      gap: 0;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      flex-wrap: wrap;
    }

    .stat {
      display: flex;
      flex-direction: column;
      padding: 10px 20px;
      border-right: 1px solid var(--border);
      min-width: 100px;
    }

    .stat label {
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.08em;
      color: var(--muted);
      text-transform: uppercase;
      margin-bottom: 2px;
    }

    .stat .primary {
      font-size: 20px;
      font-weight: 600;
      color: var(--text);
      line-height: 1.2;
    }

    .stat .secondary {
      font-size: 12px;
      color: var(--muted);
      margin-top: 1px;
    }

    /* ── Target control ─────────────────────────────────────────────────── */
    .target-control {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 20px;
      flex-wrap: wrap;
    }

    #target-input {
      background: rgba(159, 180, 203, 0.07);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      font-family: var(--font);
      font-size: 14px;
      padding: 5px 10px;
      width: 80px;
      outline: none;
    }
    #target-input:focus { border-color: var(--accent2); }

    #target-submit {
      background: rgba(64, 196, 255, 0.12);
      border: 1px solid rgba(64, 196, 255, 0.3);
      border-radius: 6px;
      color: var(--accent2);
      font-family: var(--font);
      font-size: 13px;
      font-weight: 600;
      padding: 5px 14px;
      cursor: pointer;
    }
    #target-submit:hover:not(:disabled) { background: rgba(64, 196, 255, 0.2); }
    #target-submit:disabled { opacity: 0.4; cursor: default; }

    #target-feedback {
      font-size: 12px;
      color: var(--muted);
    }

    /* ── Charts section ─────────────────────────────────────────────────── */
    section {
      padding: 16px 20px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    article {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      overflow: hidden;
    }

    .chart-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 14px;
      border-bottom: 1px solid var(--border);
    }

    .chart-title-left {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.06em;
      color: var(--accent);
      text-transform: uppercase;
    }

    .chart-title-right {
      font-size: 11px;
      color: var(--muted);
      letter-spacing: 0.04em;
    }

    canvas.chart {
      display: block;
      width: 100%;
      height: auto;
    }

    .chart-legend {
      display: flex;
      flex-wrap: wrap;
      gap: 6px 16px;
      padding: 6px 14px 8px;
      border-top: 1px solid var(--border);
      font-size: 11px;
      color: var(--muted);
    }
    .legend-item {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      white-space: nowrap;
    }
    .legend-swatch {
      display: inline-block;
      width: 16px;
      height: 2px;
      border-radius: 1px;
      flex-shrink: 0;
    }

    .stat a.primary {
      color: var(--accent2);
      text-decoration: none;
    }
    .stat a.primary:hover { text-decoration: underline; }

    .stats-bar .target-control {
      border-left: 1px solid var(--border);
    }
  </style>
</head>
<body>

  <header>
    <div class="header-left">
      <h1 id="title">BREWSTER CONTROL PANEL</h1>
    </div>
    <div class="header-right">
      <span id="collect-dot" class="collect-dot" title="Collection status"></span>
      <span id="ntp-pill" class="status-pill status-warn">NTP pending</span>
      <div class="menu-container">
        <button id="menu-btn" aria-expanded="false" aria-haspopup="true" title="Menu">⋮</button>
        <div id="menu-dropdown" role="menu">
          <button id="start-data" role="menuitem">Start collection</button>
          <button id="stop-data" role="menuitem">Stop collection</button>
          <button id="clear-data" role="menuitem">Clear history</button>
        </div>
      </div>
    </div>
  </header>

  <div class="stats-bar">
    <div class="stat">
      <label>Temperature</label>
      <span id="temp" class="primary">--.- C</span>
      <span id="temp-secondary" class="secondary">--.- F</span>
    </div>
    <div class="stat">
      <label>Target</label>
      <span id="target" class="primary">--.- C</span>
      <span id="target-secondary" class="secondary">--.- F</span>
    </div>
    <div class="stat">
      <label>PID output</label>
      <span id="pid" class="primary">0.0%</span>
    </div>
    <div class="stat">
      <label>Relay</label>
      <span id="relay" class="primary">--</span>
    </div>
    <div class="stat">
      <label>Device IP</label>
      <a id="ip" class="primary" target="_blank" rel="noopener">--</a>
    </div>
    <div class="stat">
      <label>Updated</label>
      <span id="updated" class="primary">Connecting…</span>
    </div>
    <div class="stat">
      <label>Uptime</label>
      <span id="uptime" class="primary">--</span>
    </div>
    <div class="stat">
      <label>Seq / Drops</label>
      <span id="seq-info" class="primary">--</span>
    </div>
    <div class="target-control">
      <input id="target-input" type="number" step="0.1" min="-20" max="100" placeholder="°C" autocomplete="off">
      <button id="target-submit">Set target</button>
      <span id="target-feedback"></span>
    </div>
  </div>

  <section>
    <article data-card-type="temp" data-sensor-index="0">
      <div class="chart-header">
        <span id="temp-chart-probe-0" class="chart-title-left">probe-1</span>
        <span class="chart-title-right">Temperature</span>
      </div>
      <canvas id="temp-chart-0" class="chart" width="1120" height="220"></canvas>
      <div class="chart-legend" id="temp-legend-0"></div>
    </article>

    <article data-card-type="pid" data-sensor-index="0">
      <div class="chart-header">
        <span id="pid-chart-probe-0" class="chart-title-left">probe-1</span>
        <span class="chart-title-right">PID / Relay</span>
      </div>
      <canvas id="pid-chart-0" class="chart" width="1120" height="220"></canvas>
      <div class="chart-legend" id="pid-legend-0"></div>
    </article>
  </section>

  <script src="dashboard.js"></script>
</body>
</html>
